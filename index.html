<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crucigramas PWA</title>
  
  <link rel="stylesheet" href="styles.css?v=5" />
  
  <link rel="manifest" href="manifest.webmanifest" />
  
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1220" />
</head>
<body>

  <input type="text" id="hiddenInput" autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false" style="position: absolute; opacity: 0; left: -9999px; top: 0; width: 1px; height: 1px; font-size: 16px;" />

  <header class="topbar">
    <div class="brand">Crucigramas ES</div>
    <div class="controls">
      <span class="label">Crucigrama:</span>
      <select id="cwSelect" class="select">
        <option value="">Cargando...</option>
      </select>
    </div>
  </header>

  <main class="layout">
    
    <section class="boardWrap">
      <div class="hintRow">
        <div class="activeInfo">
          <span class="k">Dirección:</span><span id="dirText" style="font-weight:700; color:var(--accent2);">—</span>
          <span class="k" style="margin-left:12px;">Pista:</span><span id="entryText" style="font-weight:700;">—</span>
        </div>
        <div class="buttons">
          <button id="checkBtn" class="btn">Comprobar</button>
          <button id="clearBtn" class="btn secondary">Limpiar todo</button>
        </div>
      </div>

      <div id="board" class="board"></div>
    </section>

    <aside class="side">
      <div class="panel">
        <h2>Pistas del Juego</h2>
        <div class="clues">
          <div>
            <div class="clueTitle">Horizontales</div>
            <div id="cluesAcross" class="clueList"></div>
          </div>
          <div>
            <div class="clueTitle">Verticales</div>
            <div id="cluesDown" class="clueList"></div>
          </div>
        </div>
      </div>
    </aside>

  </main>

  <footer class="footer">
    <p>Crucigramas PWA - Optimizado para PC y Smartphones</p>
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado con éxito'))
          .catch(err => console.error('Error al registrar el SW:', err));
      });
    }
  </script>

  <script src="app.js?v=5"></script>

</body>
</html>
